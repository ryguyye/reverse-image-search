name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check src tests
      - name: Smoke import
        env:
          PYTHONPATH: src
        run: python -c "from selfwatch.main import app; assert app.title == 'selfwatch'"
      - name: Test
        env:
          PYTHONPATH: src
        run: pytest -q
